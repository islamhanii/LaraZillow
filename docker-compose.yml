version: '3.8'

services:

  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      args:
        - UID=${UID:-1000}
        - GID=${GID:-1000}
    working_dir: /var/www
    restart: always
    volumes:
      - ./src:/var/www
    depends_on:
      - mysql
    networks:
      - larazillow

  nginx:
    image: nginx:1.30.3-alpine
    restart: always
    ports:
      - "${APP_PORT}:80"
    volumes:
      - ./src:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - larazillow

  mysql:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "${MYSQL_PORT}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - larazillow

  node:
    image: node:24.17.0-alpine
    restart: always
    working_dir: /var/www
    volumes:
      - ./src:/var/www
    ports:
      - "${VITE_PORT}:5173"
    command: sh -c "npm install && npx vite --host 0.0.0.0 --port 5173"
    depends_on:
      - app

volumes:
  mysql_data:

networks:
  larazillow: